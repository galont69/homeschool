<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#5b57e8">

    :root {
      color-scheme: light;
      --brand: #5b57e8;
      --brand-dark: #4742ce;
      --brand-soft: #eeedff;
      --ink: #171821;
      --sub: #6d7180;
      --line: #e8e9ef;
      --paper: #f5f5f8;
      --white: #fff;
      --mint: #0f9f6e;
      --mint-soft: #e5f8f0;
      --danger: #c83d5b;
      --shadow: 0 18px 55px rgba(41, 40, 79, .09);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --sidebar: 248px;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(91, 87, 232, .11), transparent 25rem),
        #f7f7fa;
      font-family: "Noto Sans Thai", "Leelawadee UI", Tahoma, system-ui, sans-serif;
    }
    button, input, textarea { font: inherit; }
    button { color: inherit; }
    svg { display: block; }
    .hidden { display: none !important; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app-shell { min-height: 100vh; min-height: 100dvh; }
    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 20;
      width: var(--sidebar);
      padding: 26px 18px;
      background: rgba(255, 255, 255, .9);
      border-right: 1px solid rgba(224, 225, 234, .9);
      backdrop-filter: blur(18px);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 0 10px 25px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.3px;
    }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      color: #fff;
      background: linear-gradient(145deg, #716df0, #4d48d7);
      border-radius: 13px;
      box-shadow: 0 9px 22px rgba(91, 87, 232, .28);
    }
