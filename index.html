<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parent Dashboard — Homeschool</title>

<script>
  tailwind = {
    config: {
      theme: {
        extend: {
          fontFamily: { sans: ['"IBM Plex Sans Thai"', 'system-ui', 'sans-serif'] },
          colors: {
            ink: '#16181D',
            sub: '#6A6F7A',
            line: '#ECEDF1',
            brand: { DEFAULT: '#5B57E8', soft: '#ECEBFD', tint: '#F6F5FE' },
            mint: { DEFAULT: '#12A471', soft: '#E3F6EE' },
            paper: '#F4F4F7',
          },
          boxShadow: {
            card: '0 1px 2px rgba(22,24,29,.04), 0 8px 24px rgba(22,24,29,.05)',
            soft: '0 1px 2px rgba(22,24,29,.04), 0 4px 12px rgba(22,24,29,.04)',
            pill: '0 6px 18px rgba(91,87,232,.32)',
          },
          borderRadius: { '4xl': '2rem' },
        }
      }
    }
  }
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; height:100%; }
  body {
    background:#22242B;
    font-family:"IBM Plex Sans Thai", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .stage {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .device {
    width:834px;
    height:1194px;
    background:#fff;
    border-radius:44px;
    position:relative;
    overflow:hidden;
    box-shadow: 0 0 0 12px #0e0f13, 0 0 0 14px #2c2e36, 0 40px 90px rgba(0,0,0,.55);
    transform-origin:center center;
  }

  .scroll {
    position:absolute;
    inset:0;
    overflow-y:auto;
    overflow-x:hidden;
    padding-bottom:128px;
  }

  .scroll::-webkit-scrollbar { width:0; }

  .map-bg {
    background:
      radial-gradient(120% 120% at 70% -10%, #EEEDFE 0%, #F5F5FB 38%, #EEF1F4 100%);
  }

  .road { position:absolute; background:#fff; border-radius:99px; }

  .grid-faint {
    background-image:
      linear-gradient(rgba(99,102,120,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,120,.06) 1px, transparent 1px);
    background-size:46px 46px;
  }

  @keyframes ripple {
    0% { transform:scale(.55); opacity:.55 }
    100% { transform:scale(1.25); opacity:0 }
  }

  .ripple { animation: ripple 3.2s ease-out infinite; }
  .ripple.d2 { animation-delay:1.05s; }
  .ripple.d3 { animation-delay:2.1s; }

  .pin-drop { animation: drop .5s cubic-bezier(.2,.8,.2,1.4) both; }

  @keyframes drop {
    0% { transform:translateY(-14px); opacity:0 }
    100% { transform:translateY(0); opacity:1 }
  }

  .check-on {
    background:#12A471;
    border-color:#12A471;
  }

  .chk svg {
    opacity:0;
    transition:opacity .15s;
  }

  .chk.check-on svg {
    opacity:1;
  }

  .row-done .subj-name {
    color:#A2A6AF;
    text-decoration:line-through;
    text-decoration-color:#CDD0D6;
  }
</style>
</head>

<body>
<div class="stage">
  <div class="device" id="device">
    <div class="scroll">

      <header class="px-7 pt-9 pb-5">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-4">
            <div class="relative">

              </div>
              <span class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-mint ring-[3px] ring-white"></span>
            </div>

            <div>
              <p class="text-sub text-[15px] leading-none mb-1.5">สวัสดีตอนเช้า,</p>
              <h1 class="text-ink text-[26px] font-bold leading-none">คุณกานต์ ใจดี</h1>
              <div class="mt-2.5 inline-flex items-center gap-1.5 bg-ink text-white text-[12.5px] font-medium pl-1.5 pr-3 py-1 rounded-full whitespace-nowrap">

      <section class="px-7 mt-2">

            <div class="road w-3 h-[150%]" style="left:30%; top:-20%; transform:rotate(9deg);"></div>

            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
              <div class="ripple absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>
              <div class="ripple d2 absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>
              <div class="ripple d3 absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>

            <div class="absolute z-10 pin-drop" style="right:24%; top:24%; animation-delay:.25s;">

                </div>

            </div>

            <div class="absolute z-10 pin-drop" style="right:30%; bottom:16%; animation-delay:.4s;">
              <div class="flex flex-col items-center">
                <div class="w-10 h-10 rounded-full bg-white shadow-card grid place-items-center ring-1 ring-line">
                  <i data-lucide="home" class="w-5 h-5 text-brand"></i>

            <div class="absolute top-4 left-4 bg-white/85 backdrop-blur px-3 py-1.5 rounded-full flex items-center gap-2 shadow-soft">

            </div>
          </div>

          <div class="p-6 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3.5">
              <div class="flex -space-x-3">
                <span class="w-9 h-9 rounded-full bg-[#FFE2C7] grid place-items-center text-[13px] font-semibold text-[#B86A2E] ring-[3px] ring-white">บ</span>
                <span class="w-9 h-9 rounded-full bg-mint-soft grid place-items-center text-[13px] font-semibold text-mint ring-[3px] ring-white">ก</span>
                <span class="w-9 h-9 rounded-full bg-brand-soft grid place-items-center text-[13px] font-semibold text-brand ring-[3px] ring-white">ม</span>
              </div>
              <div>
                <p class="text-ink text-[17px] font-bold leading-none">พบ 3 ครอบครัวในพื้นที่</p>
                <p class="text-sub text-[13.5px] mt-1.5">ในรัศมี 5 กม. จากบ้านคุณ</p>

            <button class="inline-flex items-center gap-2 bg-ink text-white text-[15px] font-semibold px-5 py-3.5 rounded-full active:scale-95 transition shrink-0">
              <i data-lucide="users" class="w-[18px] h-[18px]"></i>

      </section>

      <div class="h-2"></div>

    <nav class="absolute bottom-0 inset-x-0 h-[104px] bg-white/95 backdrop-blur-xl border-t border-line px-6 flex items-start pt-3.5">

          <span class="w-12 h-9 rounded-full bg-brand-soft grid place-items-center">

          </span>

        <button class="flex flex-col items-center gap-1.5">
          <span class="w-12 h-9 grid place-items-center">

</div>

<script>
  const SUPABASE_URL = "https://ewsftltgehrumfnmugi.supabase.co";

  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3c2Z0bHRnZWhmcnVtZm5tdWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTUwMzQsImV4cCI6MjA5NjIzMTAzNH0.rYefsViZAFttNqiRQvAPv2E8wcq1vph5WPv2n8nrYL0";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let tasks = [];

  const defaultStyles = {
    "คณิตศาสตร์": { icon: "calculator", tint: "#ECEBFD", fg: "#5B57E8" },
    "อ่านนิทาน": { icon: "book-open", tint: "#E3F6EE", fg: "#12A471" },
    "ศิลปะสร้างสรรค์": { icon: "palette", tint: "#FFEFD9", fg: "#E0892F" },
    "วิทยาศาสตร์": { icon: "sprout", tint: "#E6F4FB", fg: "#2E86C1" },
    "ออกกำลังกาย": { icon: "activity", tint: "#FCE6EE", fg: "#D6457E" }
  };

  function showStatus(message, type = "info") {
    const box = document.getElementById("statusBox");
    if (!box) return;

    box.classList.remove("hidden");

    if (type === "error") {
      box.className = "mt-4 mb-2 rounded-2xl px-4 py-3 text-[13.5px] bg-red-50 text-red-700 border border-red-100";
    } else if (type === "success") {
      box.className = "mt-4 mb-2 rounded-2xl px-4 py-3 text-[13.5px] bg-green-50 text-green-700 border border-green-100";
    } else {
      box.className = "mt-4 mb-2 rounded-2xl px-4 py-3 text-[13.5px] bg-slate-50 text-slate-700 border border-slate-100";
    }

    box.textContent = message;
  }

  function hideStatus() {
    const box = document.getElementById("statusBox");
    if (!box) return;
    box.classList.add("hidden");
    box.textContent = "";
  }

  function escapeHTML(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  async function fetchTasks() {
    const list = document.getElementById("taskList");

    try {
      if (list) {
        list.innerHTML = `<div class="text-sub text-[14px] py-6 text-center">กำลังโหลดข้อมูลจาก Supabase...</div>`;
      }

      hideStatus();

      const { data, error } = await supabaseClient
        .from("tasks")
        .select("id,t,name,detail,icon,tint,fg,done")
        .order("t", { ascending: true });

      if (error) {
        throw error;
      }

      tasks = data || [];

      renderTasks();

      if (tasks.length === 0) {
        showStatus("เชื่อมต่อ Supabase สำเร็จ แต่ยังไม่มีข้อมูลในตาราง tasks", "info");
      } else {
        hideStatus();
      }

      console.log("โหลดข้อมูลสำเร็จ:", tasks);

    } catch (err) {
      console.error("Supabase error:", err);

      if (list) {
        list.innerHTML = `
          <div class="text-red-600 bg-red-50 border border-red-100 rounded-3xl p-4 text-[14px] leading-relaxed">
            ดึงข้อมูลจาก Supabase ไม่ได้<br>
            <span class="text-[12.5px]">${escapeHTML(err.message || err)}</span>
          </div>
        `;
      }

      showStatus("ดึงข้อมูลไม่ได้: " + (err.message || err), "error");
      refreshProgress();
    }
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    if (!list) return;

    if (!tasks || tasks.length === 0) {
      list.innerHTML = `<div class="text-sub text-[14px] py-6 text-center">ยังไม่มีกิจกรรมวันนี้</div>`;
      refreshProgress();
      lucide.createIcons();
      return;
    }

    list.innerHTML = tasks.map((x, i) => {
      const style = defaultStyles[x.name] || {
        icon: x.icon || "star",
        tint: "#F4F4F7",
        fg: "#6A6F7A"
      };

      const currentIcon = x.icon || style.icon;
      const currentBg = x.tint || style.tint;
      const currentFg = x.fg || style.fg;
      const isDone = x.done === true;

      return `
        <div class="task-row flex items-center gap-4 p-3.5 rounded-3xl bg-paper/70 hover:bg-paper transition ${isDone ? "row-done" : ""}"
             data-id="${escapeHTML(x.id)}"
             data-i="${i}">
          
          <div class="w-12 h-12 rounded-2xl grid place-items-center shrink-0" style="background:${escapeHTML(currentBg)}">
            <i data-lucide="${escapeHTML(currentIcon)}" class="w-[22px] h-[22px]" style="color:${escapeHTML(currentFg)}"></i>
          </div>

          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2">
              <span class="text-[12.5px] font-semibold text-sub tabular-nums">${escapeHTML(x.t || "00:00")}</span>
              <span class="subj-name text-ink text-[17px] font-semibold truncate">${escapeHTML(x.name || "ไม่มีชื่อวิชา")}</span>
            </div>
            <p class="text-sub text-[13.5px] mt-0.5 truncate">${escapeHTML(x.detail || "")}</p>
          </div>

          <button type="button"
                  class="chk w-9 h-9 rounded-full border-2 ${isDone ? "check-on" : "border-line bg-white"} grid place-items-center shrink-0 active:scale-90 transition"
                  aria-label="เปลี่ยนสถานะกิจกรรม">
            <i data-lucide="check" class="w-5 h-5 text-white"></i>
          </button>
        </div>
      `;
    }).join("");

    lucide.createIcons();
    bindClickEvents();
    refreshProgress();
  }

  function refreshProgress() {
    const bar = document.getElementById("progBar");
    const txt = document.getElementById("progTxt");

    if (!tasks || tasks.length === 0) {
      if (bar) bar.style.width = "0%";
      if (txt) txt.textContent = "0%";
      return;
    }

    const done = tasks.filter(t => t.done === true).length;
    const pct = Math.round((done / tasks.length) * 100);

    if (bar) bar.style.width = pct + "%";
    if (txt) txt.textContent = pct + "%";
  }

  function bindClickEvents() {
    document.querySelectorAll(".task-row").forEach(row => {
      const id = row.dataset.id;
      const index = Number(row.dataset.i);
      const chkBtn = row.querySelector(".chk");

      if (!chkBtn || !id || Number.isNaN(index)) return;

      chkBtn.addEventListener("click", async () => {
        const oldStatus = tasks[index].done === true;
        const newStatus = !oldStatus;

        chkBtn.disabled = true;
        chkBtn.classList.add("opacity-60");

        try {
          const { error } = await supabaseClient
            .from("tasks")
            .update({ done: newStatus })
            .eq("id", id);

          if (error) {
            throw error;
          }

          tasks[index].done = newStatus;

          if (newStatus) {
            chkBtn.classList.add("check-on");
            chkBtn.classList.remove("border-line", "bg-white");
            row.classList.add("row-done");
          } else {
            chkBtn.classList.remove("check-on");
            chkBtn.classList.add("border-line", "bg-white");
            row.classList.remove("row-done");
          }

          refreshProgress();
          hideStatus();

        } catch (err) {
          console.error("Update error:", err);
          showStatus("บันทึกสถานะไม่ได้: " + (err.message || err), "error");
        } finally {
          chkBtn.disabled = false;
          chkBtn.classList.remove("opacity-60");
        }
      });
    });
  }

  function fit() {
    const d = document.getElementById("device");
    if (!d) return;

    const s = Math.min(
      (window.innerWidth - 32) / 834,
      (window.innerHeight - 32) / 1194,
      1
    );

    d.style.transform = `scale(${s})`;
  }

  window.addEventListener("resize", fit);

  document.addEventListener("DOMContentLoaded", () => {
    fit();
    lucide.createIcons();
    fetchTasks();
  });
</script>
</body>
</html>
