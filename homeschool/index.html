<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Parent Dashboard — Homeschool</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['"IBM Plex Sans Thai"', 'system-ui', 'sans-serif'] },
        colors: {
          ink:    '#16181D',
          sub:    '#6A6F7A',
          line:   '#ECEDF1',
          brand:  { DEFAULT: '#5B57E8', soft: '#ECEBFD', tint: '#F6F5FE' },
          mint:   { DEFAULT: '#12A471', soft: '#E3F6EE' },
          paper:  '#F4F4F7',
        },
        boxShadow: {
          card: '0 1px 2px rgba(22,24,29,.04), 0 8px 24px rgba(22,24,29,.05)',
          soft: '0 1px 2px rgba(22,24,29,.04), 0 4px 12px rgba(22,24,29,.04)',
          pill: '0 6px 18px rgba(91,87,232,.32)',
        },
        borderRadius: { '4xl': '2rem' },
      }
    }
  }
</script>
<style>
  html, body { margin:0; height:100%; }
  body { background:#22242B; font-family:"IBM Plex Sans Thai", sans-serif; -webkit-font-smoothing:antialiased; }
  .stage { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .device {
    width:834px; height:1194px; background:#fff; border-radius:44px;
    position:relative; overflow:hidden;
    box-shadow: 0 0 0 12px #0e0f13, 0 0 0 14px #2c2e36, 0 40px 90px rgba(0,0,0,.55);
    transform-origin:center center;
  }
  .scroll { position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; padding-bottom:128px; }
  .scroll::-webkit-scrollbar { width:0; }
  /* simulated map */
  .map-bg {
    background:
      radial-gradient(120% 120% at 70% -10%, #EEEDFE 0%, #F5F5FB 38%, #EEF1F4 100%);
  }
  .road { position:absolute; background:#fff; border-radius:99px; }
  .grid-faint {
    background-image:
      linear-gradient(rgba(99,102,120,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,120,.06) 1px, transparent 1px);
    background-size:46px 46px;
  }
  @keyframes ripple { 0%{ transform:scale(.55); opacity:.55 } 100%{ transform:scale(1.25); opacity:0 } }
  .ripple { animation: ripple 3.2s ease-out infinite; }
  .ripple.d2 { animation-delay:1.05s; }
  .ripple.d3 { animation-delay:2.1s; }
  .pin-drop { animation: drop .5s cubic-bezier(.2,.8,.2,1.4) both; }
  @keyframes drop { 0%{ transform:translateY(-14px); opacity:0 } 100%{ transform:translateY(0); opacity:1 } }
  .check-on { background:#12A471; border-color:#12A471; }
  .chk svg { opacity:0; transition:opacity .15s; }
  .chk.check-on svg { opacity:1; }
  .row-done .subj-name { color:#A2A6AF; text-decoration:line-through; text-decoration-color:#CDD0D6; }
</style>
</head>
<body>
<div class="stage">
  <div class="device" id="device">
    <div class="scroll">

      <header class="px-7 pt-9 pb-5">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-4">
            <div class="relative">
              <div class="w-[58px] h-[58px] rounded-2xl bg-brand-soft grid place-items-center overflow-hidden ring-1 ring-line">
                <span class="text-brand font-700 text-xl">ก</span>
              </div>
              <span class="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-mint ring-[3px] ring-white"></span>
            </div>
            <div>
              <p class="text-sub text-[15px] leading-none mb-1.5">สวัสดีตอนเช้า,</p>
              <h1 class="text-ink text-[26px] font-700 leading-none">คุณกานต์ ใจดี</h1>
              <div class="mt-2.5 inline-flex items-center gap-1.5 bg-ink text-white text-[12.5px] font-500 pl-1.5 pr-3 py-1 rounded-full whitespace-nowrap">
                <span class="grid place-items-center w-5 h-5 rounded-full bg-brand"><i data-lucide="sparkles" class="w-3 h-3 text-white"></i></span>
                Pro Member
              </div>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button class="w-12 h-12 rounded-2xl bg-paper grid place-items-center text-ink active:scale-95 transition">
              <i data-lucide="search" class="w-[21px] h-[21px]"></i>
            </button>
            <button class="relative w-12 h-12 rounded-2xl bg-paper grid place-items-center text-ink active:scale-95 transition">
              <i data-lucide="bell" class="w-[21px] h-[21px]"></i>
              <span class="absolute top-3 right-3 w-2 h-2 rounded-full bg-[#FF5A5A] ring-2 ring-paper"></span>
            </button>
          </div>
        </div>
      </header>

      <section class="px-7 mt-2">
        <div class="bg-white rounded-4xl border border-line shadow-card p-6">
          <div class="flex items-center justify-between mb-1">
            <div>
              <h2 class="text-ink text-[20px] font-700 leading-none">ตารางกิจกรรมวันนี้</h2>
              <p class="text-sub text-[13.5px] mt-1.5">ศุกร์ 6 มิถุนายน 2569 · น้องพราว (5 ขวบ)</p>
            </div>
            <button class="inline-flex items-center gap-1.5 bg-brand text-white text-[14px] font-600 pl-3 pr-4 py-2.5 rounded-full shadow-pill active:scale-95 transition">
              <i data-lucide="plus" class="w-4 h-4"></i> เพิ่มกิจกรรม
            </button>
          </div>

          <div class="flex items-center gap-3 mt-5 mb-5">
            <div class="flex-1 h-2.5 rounded-full bg-paper overflow-hidden">
              <div id="progBar" class="h-full rounded-full bg-mint transition-all duration-500" style="width:0%"></div>
            </div>
            <span id="progTxt" class="text-[13px] font-600 text-sub tabular-nums">0%</span>
          </div>

          <div id="taskList" class="flex flex-col gap-2.5"></div>
        </div>
      </section>

      <section class="px-7 mt-5">
        <button class="group w-full bg-ink text-white rounded-4xl p-6 flex items-center gap-5 shadow-card active:scale-[.99] transition text-left">
          <span class="w-[62px] h-[62px] rounded-3xl bg-white/10 grid place-items-center shrink-0 group-active:bg-white/20 transition">
            <i data-lucide="camera" class="w-8 h-8"></i>
          </span>
          <span class="flex-1">
            <span class="block text-[20px] font-700 leading-tight">ถ่ายรูป / อัปโหลดผลงาน</span>
            <span class="block text-white/60 text-[14px] mt-1">บันทึกร่องรอยการเรียนรู้ของลูกเข้าแฟ้มผลงาน</span>
          </span>
          <i data-lucide="arrow-up-right" class="w-6 h-6 text-white/50 shrink-0"></i>
        </button>
      </section>

      <section class="px-7 mt-5">
        <div class="bg-white rounded-4xl border border-line shadow-card overflow-hidden">
          <div class="relative h-[280px] map-bg">
            <div class="absolute inset-0 grid-faint"></div>
            <div class="road h-3 w-[140%]" style="top:38%; left:-10%; transform:rotate(-7deg);"></div>
            <div class="road h-2.5 w-[140%]" style="top:72%; left:-12%; transform:rotate(5deg);"></div>
            <div class="road w-3 h-[150%]" style="left:30%; top:-20%; transform:rotate(9deg);"></div>
            <div class="road w-2.5 h-[150%]" style="left:66%; top:-25%; transform:rotate(-6deg);"></div>

            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
              <div class="ripple absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>
              <div class="ripple d2 absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>
              <div class="ripple d3 absolute -translate-x-1/2 -translate-y-1/2 w-[230px] h-[230px] rounded-full bg-brand/25"></div>
              <div class="absolute -translate-x-1/2 -translate-y-1/2 w-[150px] h-[150px] rounded-full border border-brand/30"></div>
            </div>

            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 z-10">
              <div class="w-6 h-6 rounded-full bg-brand ring-4 ring-white shadow-pill"></div>
            </div>

            <div class="absolute z-10 pin-drop" style="left:26%; top:30%; animation-delay:.1s;">
              <div class="flex flex-col items-center">
                <div class="w-10 h-10 rounded-full bg-white shadow-card grid place-items-center ring-1 ring-line"><i data-lucide="home" class="w-5 h-5 text-[#F0883E]"></i></div>
                <div class="w-2 h-2 bg-white rotate-45 -mt-1 ring-1 ring-line"></div>
              </div>
            </div>
            <div class="absolute z-10 pin-drop" style="right:24%; top:24%; animation-delay:.25s;">
              <div class="flex flex-col items-center">
                <div class="w-10 h-10 rounded-full bg-white shadow-card grid place-items-center ring-1 ring-line"><i data-lucide="home" class="w-5 h-5 text-mint"></i></div>
                <div class="w-2 h-2 bg-white rotate-45 -mt-1 ring-1 ring-line"></div>
              </div>
            </div>
            <div class="absolute z-10 pin-drop" style="right:30%; bottom:16%; animation-delay:.4s;">
              <div class="flex flex-col items-center">
                <div class="w-10 h-10 rounded-full bg-white shadow-card grid place-items-center ring-1 ring-line"><i data-lucide="home" class="w-5 h-5 text-brand"></i></div>
                <div class="w-2 h-2 bg-white rotate-45 -mt-1 ring-1 ring-line"></div>
              </div>
            </div>

            <div class="absolute top-4 left-4 bg-white/85 backdrop-blur px-3 py-1.5 rounded-full flex items-center gap-2 shadow-soft">
              <span class="w-2 h-2 rounded-full bg-mint"></span>
              <span class="text-[12.5px] font-500 text-ink">เครือข่ายโฮมสคูล</span>
            </div>
          </div>

          <div class="p-6 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3.5">
              <div class="flex -space-x-3">
                <span class="w-9 h-9 rounded-full bg-[#FFE2C7] grid place-items-center text-[13px] font-600 text-[#B86A2E] ring-[3px] ring-white">บ</span>
                <span class="w-9 h-9 rounded-full bg-mint-soft grid place-items-center text-[13px] font-600 text-mint ring-[3px] ring-white">ก</span>
                <span class="w-9 h-9 rounded-full bg-brand-soft grid place-items-center text-[13px] font-600 text-brand ring-[3px] ring-white">ม</span>
              </div>
              <div>
                <p class="text-ink text-[17px] font-700 leading-none">พบ 3 ครอบครัวในพื้นที่</p>
                <p class="text-sub text-[13.5px] mt-1.5">ในรัศมี 5 กม. จากบ้านคุณ</p>
              </div>
            </div>
            <button class="inline-flex items-center gap-2 bg-ink text-white text-[15px] font-600 px-5 py-3.5 rounded-full active:scale-95 transition shrink-0">
              <i data-lucide="users" class="w-[18px] h-[18px]"></i> ค้นหาเพื่อน
            </button>
          </div>
        </div>
      </section>

      <div class="h-2"></div>
    </div>

    <nav class="absolute bottom-0 inset-x-0 h-[104px] bg-white/95 backdrop-blur-xl border-t border-line px-6 flex items-start pt-3.5">
      <div class="w-full grid grid-cols-4">
        <button class="flex flex-col items-center gap-1.5 group">
          <span class="w-12 h-9 rounded-full bg-brand-soft grid place-items-center"><i data-lucide="layout-dashboard" class="w-[22px] h-[22px] text-brand"></i></span>
          <span class="text-[12.5px] font-600 text-brand whitespace-nowrap">หน้าหลัก</span>
        </button>
        <button class="flex flex-col items-center gap-1.5">
          <span class="w-12 h-9 grid place-items-center"><i data-lucide="store" class="w-[22px] h-[22px] text-sub"></i></span>
          <span class="text-[12.5px] font-500 text-sub whitespace-nowrap">ร้านค้า</span>
        </button>
        <button class="flex flex-col items-center gap-1.5">
          <span class="w-12 h-9 grid place-items-center"><i data-lucide="folder-open" class="w-[22px] h-[22px] text-sub"></i></span>
          <span class="text-[12.5px] font-500 text-sub whitespace-nowrap">แฟ้มผลงาน</span>
        </button>
        <button class="flex flex-col items-center gap-1.5">
          <span class="w-12 h-9 grid place-items-center"><i data-lucide="settings" class="w-[22px] h-[22px] text-sub"></i></span>
          <span class="text-[12.5px] font-500 text-sub whitespace-nowrap">ตั้งค่า</span>
        </button>
      </div>
    </nav>

  </div>
</div>

<script>
  // 1. กำหนดค่าการเชื่อมต่อฐานข้อมูล Supabase แท้จริงจากเครือข่ายของคุณ
  const SUPABASE_URL = "https://ewsftltgehrumfnmugi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3c2Z0bHRnZWhmcnVtZm5tdWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NTUwMzQsImV4cCI6MjA5NjIzMTAzNH0.rYefsViZAFttNqiRQvAPv2E8wcq1vph5WPv2n8nrYL0";
  
  // เรียกใช้งานไลบรารีในการสร้างไคลเอนต์ตัวเชื่อมหลังบ้าน
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let tasks = [];

  // 2. ฟังก์ชันหลักสำหรับเรียกข้อมูลตารางรายวิชาจากหลังบ้าน
  async function fetchTasks() {
    try {
      const { data, error } = await supabaseClient
        .from('tasks')
        .select('*')
        .order('t', { ascending: true }); // จัดเรียงลำดับรายการอิงตามตัวแปรตารางเวลา

      if (error) throw error;

      tasks = data || [];
      renderTasks();
    } catch (err) {
      console.error('เกิดข้อผิดพลาดในการดึงตารางกิจกรรม:', err.message);
    }
  }

  // 3. ฟังก์ชันการเรนเดอร์โครงสร้างและจัดวาง Widget แถวข้อมูลในหน้าบ้าน
  function renderTasks() {
    const list = document.getElementById('taskList');
    if (!list) return;
    
    list.innerHTML = tasks.map((x, i) => `
      <div class="task-row flex items-center gap-4 p-3.5 rounded-3xl bg-paper/70 hover:bg-paper transition ${x.done ? 'row-done' : ''}" data-id="${x.id}" data-i="${i}">
        <div class="w-12 h-12 rounded-2xl grid place-items-center shrink-0" style="background:${x.tint}">
          <i data-lucide="${x.icon}" class="w-[22px] h-[22px]" style="color:${x.fg}"></i>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="text-[12.5px] font-600 text-sub tabular-nums">${x.t}</span>
            <span class="subj-name text-ink text-[17px] font-600 truncate">${x.name}</span>
          </div>
          <p class="text-sub text-[13.5px] mt-0.5 truncate">${x.detail}</p>
        </div>
        <button class="chk w-9 h-9 rounded-full border-2 ${x.done ? 'check-on' : 'border-line bg-white'} grid place-items-center shrink-0 active:scale-90 transition">
          <i data-lucide="check" class="w-5 h-5 text-white"></i>
        </button>
      </div>
    `).join('');

    // สั่งการให้ตัว Lucide ทำการรีเฟรชไอคอนภาพที่เจนสดจากฐานข้อมูล
    lucide.createIcons();
    bindClickEvents();
    refreshProgress();
  }

  // 4. คำนวณและประมวลผลเปอร์เซ็นต์กิจกรรมในชุดแถบ Progress Bar คอยอัปเดตสถิติตลอดเวลา
  function refreshProgress() {
    if (tasks.length === 0) return;
    const done = tasks.filter(t => t.done).length;
    const pct = Math.round((done / tasks.length) * 100);
    
    const bar = document.getElementById('progBar');
    const txt = document.getElementById('progTxt');
    
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = pct + '%';
  }

  // 5. จัดระเบียบเหตุการณ์คลิกปุ่มติ๊กถูกเพื่อส่งสถานะกลับไปอัปเดตลงตารางตรงตัวต่อตัว
  function bindClickEvents() {
    document.querySelectorAll('.task-row').forEach(row => {
      const id = row.dataset.id;
      const i = +row.dataset.i;
      const chkBtn = row.querySelector('.chk');

      if (!chkBtn) return;

      chkBtn.addEventListener('click', async () => {
        const newStatus = !tasks[i].done;

        try {
          // คำสั่งส่งข้อมูลไปอัปเดตค่าฟิลด์ done ตาม id แถวเดี่ยวบน Supabase
          const { error } = await supabaseClient
            .from('tasks')
            .update({ done: newStatus })
            .eq('id', id);

          if (error) throw error;

          // เมื่อกระบวนการหลังบ้านผ่านฉลุยจึงทำการปรับปรุงสไตล์ CSS ด้านหน้าบ้านให้แมตช์ตาม
          tasks[i].done = newStatus;
          if (tasks[i].done) {
            chkBtn.classList.add('check-on');
            chkBtn.classList.remove('border-line', 'bg-white');
            row.classList.add('row-done');
          } else {
            chkBtn.classList.remove('check-on');
            chkBtn.classList.add('border-line', 'bg-white');
            row.classList.remove('row-done');
          }
          refreshProgress();
        } catch (err) {
          console.error('ไม่สามารถเซฟบันทึกสถานะได้:', err.message);
        }
      });
    });
  }

  // 6. ฟังก์ชันจัดการคำนวณ Responsive สเกลภาพหน้าจอจำลองแท็บเล็ต
  function fit() {
    const d = document.getElementById('device');
    if (!d) return;
    const s = Math.min((window.innerWidth - 32) / 834, (window.innerHeight - 32) / 1194, 1);
    d.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();

  // สั่งสั่งการเรียกทำงานเพื่อเริ่มดึงค่าทันทีเมื่อหน้าจอโหลดพร้อมทำงาน
  fetchTasks();
</script>
</body>
</html>
